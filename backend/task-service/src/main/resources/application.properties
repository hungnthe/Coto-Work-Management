# ============================================================
# TASK-SERVICE Configuration
# ============================================================
spring.application.name=task-service
server.port=8084

# ============================================================
# DATABASE
# ============================================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:task_service_db}
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD:admin123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================================================
# ============================================================
# user-service: app.jwt.secret
app.jwt.secret=${JWT_SECRET:mySecretKey123456789012345678901234567890}

# ============================================================
# INTER-SERVICE
# ============================================================
services.user-service.url=${USER_SERVICE_URL:http://localhost:8083}

# ============================================================
# CORS
# ============================================================
cors.allowed-origins=http://localhost,http://localhost:80,https://hedgiest-kasandra-semianatomic.ngrok-free.dev

# ============================================================
# CONSUL
# ============================================================
spring.cloud.consul.host=${CONSUL_HOST:localhost}
spring.cloud.consul.port=${CONSUL_PORT:8500}
spring.cloud.consul.discovery.service-name=task-service
spring.cloud.consul.discovery.health-check-path=/actuator/health
spring.cloud.consul.discovery.health-check-interval=30s

# ============================================================
# RABBITMQ
# ============================================================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:admin}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:admin123}

# ============================================================
# REDIS
# ============================================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# ============================================================
# TRACING
# ============================================================
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411}/api/v2/spans
management.tracing.sampling.probability=1.0

# ============================================================
# LOGGING
# ============================================================
logging.level.com.cotowork.taskservice=DEBUG
logging.level.org.springframework.security=WARN

# ============================================================
# SWAGGER
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ============================================================
# FILE UPLOAD
# ============================================================
file.upload-dir=/app/uploads
file.max-size-mb=20
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=100MB

# ============================================================
# ACTUATOR
# ============================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# Consul register
spring.cloud.consul.discovery.register=true
spring.cloud.consul.discovery.prefer-ip-address=true
spring.cloud.consul.discovery.instance-id=${spring.application.name}:${server.port}