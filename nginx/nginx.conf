events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    map $http_upgrade $connection_upgrade {
            default upgrade;
            ''      close;
    }

    upstream api_gateway {
        server api-gateway:8080;
    }

    upstream frontend_app {
        server frontend:80;
    }

    server {
        listen 80;
        server_name _;

        # 1. Giao diện Frontend
        location / {
            proxy_pass http://frontend_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 2. Đẩy TẤT CẢ API về cho Gateway xử lý
        location /api/ {
            proxy_pass http://api_gateway; # Gateway sẽ tự chia luồng xuống user hoặc task
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 3. WebSocket giữ nguyên (Nếu Gateway có cấu hình route WS thì đẩy qua Gateway luôn càng tốt)
        location /ws/ {
            proxy_pass http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}